name: Create service

on:
  workflow_dispatch:
    inputs:
      serviceName:
        description: Service name
        required: true
        type: string
      owner:
        description: Owning team, for example team:payments
        required: true
        type: string

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate requested service
        env:
          SERVICE_NAME: ${{ inputs.serviceName }}
          SERVICE_OWNER: ${{ inputs.owner }}
        run: |
          [[ "$SERVICE_NAME" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]] || { echo "Service name must be kebab-case"; exit 1; }
          [[ "$SERVICE_OWNER" =~ ^team:[a-z0-9]+(-[a-z0-9]+)*$ ]] || { echo "Owner must use team:name format"; exit 1; }
          echo "Validated $SERVICE_NAME for $SERVICE_OWNER"
