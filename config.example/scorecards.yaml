apiVersion: northstar.dev/v1
scorecards:
  cards:
    - id: metadata-quality
      title: Metadata quality
      description: Catalog metadata completeness and standards
      enabled: true
      primary: true
      rules:
        - id: tier
          title: Service tier is declared
          description: Operational criticality is explicit
          path: spec.tier
          operator: present
          weight: 1
          severity: required
          enabled: true
        - id: type
          title: Service type is declared
          description: Architectural role is explicit
          path: spec.type
          operator: present
          weight: 1
          severity: required
          enabled: true
        - id: critical-docs
          title: Critical services have documentation
          description: Documentation is required for higher-impact services
          path: spec.links
          operator: contains
          value: documentation
          weight: 2
          severity: required
          enabled: true
          tiers: [critical, high]
          types: [backend, fullstack]
    - id: delivery-health
      title: Delivery health
      description: Signals collected from delivery plugins
      enabled: true
      primary: false
      rules:
        - id: latest-action-succeeded
          title: Latest workflow run succeeded
          description: The most recent GitHub Actions run completed successfully
          source:
            kind: plugin
            plugin: github-actions
          path: runs.0.conclusion
          operator: equals
          value: success
          weight: 1
          severity: recommended
          enabled: true
        - id: pull-request-backlog
          title: Pull request backlog is current
          description: No pull requests are stale beyond the configured threshold
          source:
            kind: plugin
            plugin: github-pull-requests
          path: staleCount
          operator: equals
          value: 0
          weight: 1
          severity: recommended
          enabled: true
        - id: repository-standards
          title: Repository standards are complete
          description: Required repository safeguards and community files are present
          source:
            kind: plugin
            plugin: github-repository-standards
          path: coverage
          operator: equals
          value: 100
          weight: 1
          severity: recommended
          enabled: true
    - id: security-posture
      title: Security posture
      description: Security signals collected through the GitHub App
      enabled: true
      primary: false
      rules:
        - id: no-critical-alerts
          title: No high-priority security alerts
          description: Dependabot and secret-scanning alerts require immediate ownership
          source:
            kind: plugin
            plugin: github-security
          path: criticalAlerts
          operator: equals
          value: 0
          weight: 2
          severity: required
          enabled: true
