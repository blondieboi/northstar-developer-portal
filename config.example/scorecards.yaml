apiVersion: perongen.dev/v1
scorecards:
  cards:
    - id: metadata-quality
      title: Metadata quality
      description: Catalog metadata completeness and standards
      enabled: true
      primary: true
      rules:
        - id: tier
          title: Service tier is declared
          description: Operational criticality is explicit
          path: spec.tier
          operator: present
          weight: 1
          severity: required
          enabled: true
          remediation:
            guidance: Classify the service by operational criticality in spec.tier.
        - id: type
          title: Service type is declared
          description: Architectural role is explicit
          path: spec.type
          operator: present
          weight: 1
          severity: required
          enabled: true
          remediation:
            guidance: Declare the architectural role in spec.type.
        - id: critical-docs
          title: Critical services have documentation
          description: Documentation is required for higher-impact services
          path: spec.links
          operator: contains
          value: documentation
          weight: 2
          severity: required
          enabled: true
          tiers: [critical, high]
          types: [backend, fullstack]
          remediation:
            guidance: Add a documentation entry to spec.links for this high-impact service.
            docsUrl: https://backstage.io/docs/features/techdocs/
    - id: delivery-health
      title: Delivery health
      description: Signals collected from delivery plugins
      enabled: true
      primary: false
      rules:
        - id: latest-action-succeeded
          title: Latest workflow run succeeded
          description: The most recent GitHub Actions run completed successfully
          source:
            kind: plugin
            plugin: github-actions
          maxEvidenceAgeHours: 24
          path: runs.0.conclusion
          operator: equals
          value: success
          weight: 1
          severity: recommended
          enabled: true
        - id: pull-request-backlog
          title: Pull request backlog is current
          description: No pull requests are stale beyond the configured threshold
          source:
            kind: plugin
            plugin: github-pull-requests
          path: staleCount
          operator: equals
          value: 0
          weight: 1
          severity: recommended
          enabled: true
    - id: repository-standards
      title: Repository standards
      description: Ownership, documentation, policy, and default-branch safeguards collected from GitHub
      enabled: true
      primary: false
      rules:
        - id: codeowners
          title: CODEOWNERS is present
          description: Evaluated from the latest GitHub repository snapshot
          source: &repository-standards-source
            kind: plugin
            plugin: github-repository-standards
          path: checks.codeowners
          operator: equals
          value: true
          weight: 2
          severity: required
          enabled: true
        - id: readme
          title: README is present
          description: Evaluated from the latest GitHub repository snapshot
          source: *repository-standards-source
          path: checks.readme
          operator: equals
          value: true
          weight: 2
          severity: required
          enabled: true
        - id: branch-protection
          title: Default branch is protected
          description: Evaluated from the latest GitHub repository snapshot
          source: *repository-standards-source
          path: checks.branchProtection
          operator: equals
          value: true
          weight: 2
          severity: required
          enabled: true
        - id: security-policy
          title: Security policy is present
          description: Evaluated from the latest GitHub repository snapshot
          source: *repository-standards-source
          path: checks.securityPolicy
          operator: equals
          value: true
          weight: 2
          severity: required
          enabled: true
        - id: contributing
          title: Contribution guide is present
          description: Evaluated from the latest GitHub repository snapshot
          source: *repository-standards-source
          path: checks.contributing
          operator: equals
          value: true
          weight: 1
          severity: recommended
          enabled: true
        - id: issues
          title: Issue tracking is enabled
          description: Evaluated from the latest GitHub repository snapshot
          source: *repository-standards-source
          path: checks.issuesEnabled
          operator: equals
          value: true
          weight: 1
          severity: recommended
          enabled: true
        - id: description
          title: Repository description is present
          description: Evaluated from the latest GitHub repository snapshot
          source: *repository-standards-source
          path: checks.description
          operator: equals
          value: true
          weight: 1
          severity: recommended
          enabled: true
        - id: topics
          title: Repository topics are present
          description: Evaluated from the latest GitHub repository snapshot
          source: *repository-standards-source
          path: checks.topics
          operator: equals
          value: true
          weight: 1
          severity: recommended
          enabled: true
    - id: security-posture
      title: Security posture
      description: Security signals collected through the GitHub App
      enabled: true
      primary: false
      risks: [high, critical]
      rules:
        - id: no-critical-alerts
          title: No high-priority security alerts
          description: Dependabot and secret-scanning alerts require immediate ownership
          source:
            kind: plugin
            plugin: github-security
          path: criticalAlerts
          operator: equals
          value: 0
          weight: 2
          severity: required
          enabled: true
