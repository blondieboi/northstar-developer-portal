services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: perongen
      POSTGRES_PASSWORD: perongen
      POSTGRES_DB: perongen
    ports: ["${POSTGRES_PORT:-5440}:5432"]
    volumes: ["perongen-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perongen"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  perongen-data:
