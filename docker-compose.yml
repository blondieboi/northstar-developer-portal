services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: northstar
      POSTGRES_PASSWORD: northstar
      POSTGRES_DB: northstar
    ports: ["5432:5432"]
    volumes: ["northstar-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northstar"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  northstar-data:
