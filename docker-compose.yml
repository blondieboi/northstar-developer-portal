services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    profiles: [development]
    environment:
      POSTGRES_USER: perongen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for local development}
      POSTGRES_DB: perongen
    ports: ["127.0.0.1:${POSTGRES_PORT:-5440}:5432"]
    volumes: ["perongen-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  perongen-data:
